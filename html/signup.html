<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMOS - Sign up</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/books.css" /> 
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="image/x-icon" href="../img/logo-favicon.png" />
  </head>
  <body>
    <div class="wrapper">
      <nav class="navigation">
        <ul class="m-0 p-0 d-flex align-items-center w-100">
          <a href="home.html"><img src="../img/logo.png" alt="logo" class="logo-img" /></a>
          <li><a href="home.html">Home</a></li>
          <li><a href="about_us.html">About Us</a></li>
          <li><a href="books.html">Books</a></li>
          <li><a href="category.html">Categories</a></li>
          <li><a href="authors.html">Authors</a></li>

          <li class="ms-auto"><a href="login.html">Login</a></li>
          <li><a href="signup.html" style="color: #ff7b00">Sign up</a></li>
        </ul>
      </nav>

      <section class="signup-container">
        <div class="signup-form">
          <form action="">
            <h2 class="mb-1" style="font-size: 28px;">Sign up</h2>
            
            <p class="text-secondary mb-4" style="font-size: 13px; color: #cccccc !important;">
              Sign up to enjoy the feature of LUMOS.
            </p>

            <div class="custom-input-group mb-3">
              <label>Your Name</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-person"></i></span>
                <input type="text" placeholder="Phuoc Nguyen" required />
              </div>
            </div>

            <div class="custom-input-group mb-3">
              <label>Date of Birth</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-calendar-event"></i></span>
                <input
                  type="date"
                  required
                  onclick="this.showPicker()"
                  style="cursor: pointer"
                />
              </div>
            </div>

            <div class="custom-input-group mb-3">
              <label>Email</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  placeholder="phuocnguyen@gmail.com"
                  required
                />
              </div>
            </div>

            <div class="custom-input-group mb-3">
              <label>Password</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-lock"></i></span>
                <input type="password" placeholder="*********" required />
              </div>
            </div>

            <div class="d-flex align-items-center mb-4" style="font-size: 13px;">
              <input type="checkbox" id="terms-signup" required class="me-2" style="width: 15px; height: 15px; cursor: pointer;" />
              <label for="terms-signup" style="color: #dddddd;">
                I agree to the <a href="#" class="text-decoration-none fw-bold" style="color: #ff7b00;">Terms & Privacy</a>
              </label>
            </div>

            <button type="submit" class="btn-submit">Sign up</button>

            <div class="separator my-4">
              <span>Or sign up with</span>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-4">
              <a href="#" class="social-icon">
                <i class="bi bi-google"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="bi bi-facebook"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="bi bi-apple"></i>
              </a>
            </div>

            <p class="text-center" style="font-size: 13px; color: #dddddd;">
              Already have an account? <a href="login.html" class="text-decoration-none fw-bold" style="color: #ff7b00;">Sign in</a>
            </p>
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
