  <head>
    <meta charset="UTF-8" />

    <link href="../css/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/bootstrap-icons-1.13.1/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/books.css" />

    <script src="../js/jquery-4.0.0.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <link rel="icon" type="image/x-icon" href="../img/logo-favicon.png" />
  </head>
  <body>
    <div class="wrapper">
      <nav class="navigation sticky-top">
  
        <ul class="list-unstyled m-0 p-0 d-flex align-items-center w-100">
          <a href="index.html" class="me-3"><img src="../img/logo.png" alt="logo" class="logo-img" /></a>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="index.html">Home</a>
          </li>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill dropdown">
            <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
              About Us
            </a>
            <ul class="dropdown-menu mt-3" style="background-color: rgba(9, 38, 53, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;">
              <li><a class="dropdown-item text-white py-2 custom-hover" href="about_us.html">About LUMOS</a></li>
              <li><a class="dropdown-item text-white py-2 custom-hover" href="../html/about_us/member.html">Member</a></li>
              <li><a class="dropdown-item text-white py-2 custom-hover" href="../html/about_us/sitemap.html">Sitemap</a></li>
            </ul>
          </li>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="books.html">Books</a>
          </li>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="category.html">Categories</a>
          </li>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="authors.html">Authors</a>
          </li>
          <li class="nav-btn ms-auto mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="login.html" style="color: #ff7b00">Login</a>
          </li>
          <li class="nav-btn mx-2 d-flex justify-content-center align-items-center rounded-pill">
            <a href="signup.html">Sign Up</a>
          </li>
        </ul>
      </nav>
      
      <section class="login-container d-flex justify-content-between align-items-center">
        <div class="slogan">
          <img src="../img/slogan.png" alt="Light up your mind" />
        </div>

        <div class="login-form">
          <form action="">
            <h2 class="text-center mb-4">Login</h2>

            <div class="custom-input-group mb-3">
              <label>Username</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-person"></i></span>
                <input
                  type="text"
                  placeholder="Mobile number or email"
                  required
                />
              </div>
            </div>

            <div class="custom-input-group mb-3">
              <label>Password</label>
              <div class="input-container">
                <span class="icon"><i class="bi bi-lock"></i></span>
                <input type="password" placeholder="Password" required />
              </div>
            </div>

            <div class="text-end mb-4" style="margin-top: -10px;">
              <a href="#" class="text-white text-decoration-none" style="font-size: 13px;">Forgot password ?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>

            <div class="separator my-4">
              <span>Or login using</span>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-4">
              <a href="#" class="social-icon">
                <i class="bi bi-google"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="bi bi-facebook"></i>
              </a>
              <a href="#" class="social-icon">
                <i class="bi bi-apple"></i>
              </a>
            </div>

            <p class="text-center" style="font-size: 14px;">
              Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold" style="color: #ff7b00;">Sign up</a>
            </p>
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
